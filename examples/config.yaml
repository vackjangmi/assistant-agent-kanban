kanban_root: ./.kanban-agent
repo_root: .
base_branch: main
target_repo_docs_root: docs/kanban-agent

opencode:
  binary: opencode
  worker_live_logs_enabled: false
  planner_agent: fs-kanban-planner
  planner_model: null
  planner_session_token_budget: 250000
  request_draft_agent: fs-kanban-request-draft
  request_draft_model: null
  plan_approval_agent: fs-kanban-plan-approval
  plan_approval_model: null
  plan_approval_session_token_budget: 250000
  implementer_agent: fs-kanban-implementer
  implementer_model: null
  implementer_session_token_budget: 250000
  reviewer_agent: fs-kanban-reviewer
  reviewer_model: null
  reviewer_session_token_budget: 250000
  commit_agent: fs-kanban-committer
  commit_model: null
  commit_session_token_budget: 250000
  timeout_seconds: 1800

codex:
  binary: codex
  planner_model: null
  planner_session_token_budget: 250000
  request_draft_model: null
  plan_approval_model: null
  plan_approval_session_token_budget: 250000
  implementer_model: null
  implementer_session_token_budget: 250000
  reviewer_model: null
  reviewer_session_token_budget: 250000
  commit_model: null
  commit_session_token_budget: 250000
  timeout_seconds: 1800

gemini:
  binary: gemini
  planner_model: null
  planner_session_token_budget: 250000
  request_draft_model: null
  plan_approval_model: null
  plan_approval_session_token_budget: 250000
  implementer_model: null
  implementer_session_token_budget: 250000
  reviewer_model: null
  reviewer_session_token_budget: 250000
  commit_model: null
  commit_session_token_budget: 250000
  timeout_seconds: 1800

claude:
  binary: claude
  planner_model: null
  planner_session_token_budget: 250000
  request_draft_model: null
  plan_approval_model: null
  plan_approval_session_token_budget: 250000
  implementer_model: null
  implementer_session_token_budget: 250000
  reviewer_model: null
  reviewer_session_token_budget: 250000
  commit_model: null
  commit_session_token_budget: 250000
  timeout_seconds: 1800

antigravity:
  binary: agy
  settings_path: null
  dangerously_skip_permissions: true
  sandbox: false
  planner_model: null
  planner_session_token_budget: 250000
  request_draft_model: null
  plan_approval_model: null
  plan_approval_session_token_budget: 250000
  implementer_model: null
  implementer_session_token_budget: 250000
  reviewer_model: null
  reviewer_session_token_budget: 250000
  commit_model: null
  commit_session_token_budget: 250000
  timeout_seconds: 1800

workspace:
  strategy: clone-overlay
  root: ./.kanban-agent/_runtime/workspaces
  overlay_copy:
    - .env.example
  overlay_symlink: []

locks:
  heartbeat_seconds: 10
  stale_after_seconds: 60
  timeout_seconds: 5

runtime:
  poll_interval_seconds: 0.2
  auto_dispatch: true
  language: EN
  theme: light
  coding_assistant: opencode
  role_backends:
    planner: null
    request_draft: null
    plan_approval: null
    implementer: null
    reviewer: null
    commit: null
  planner_agent_count: 1
  implementer_agent_count: 1
  reviewer_agent_count: 1

repo_discovery:
  root: ../
  max_depth: 1

slack:
  enabled: false
  socket_mode_enabled: true
  bot_token: null
  app_token: null
  default_channel: null
  default_channel_display: null
  app_mention_enabled: false

auth:
  enabled: false
  database_path: null
  encryption_key_path: null
  session_cookie_name: assistant_agent_kanban_session
  session_ttl_seconds: 1209600
  require_admin_for_common_settings: true

review_branch_remote:
  enabled: false
  remote_name: origin
  require_push_success: true
  delete_on_cleanup: true
