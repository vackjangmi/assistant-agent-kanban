name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: python -m pip install -e '.[dev]'

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m pyright

      - name: Test
        run: pytest -q
